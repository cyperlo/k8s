# ConfigMap 示例
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  app.properties: |
    database.host=mysql-service
    database.port=3306
    log.level=info
  APP_ENV: "production"
  MAX_CONNECTIONS: "100"

---
# Secret 示例
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
data:
  # 使用 base64 编码：echo -n 'mypassword' | base64
  db-password: bXlwYXNzd29yZA==
  api-key: c2VjcmV0a2V5MTIz

---
# 使用 ConfigMap 和 Secret 的 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-config
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: app
        image: nginx:1.21
        env:
        # 从 ConfigMap 读取环境变量
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV
        # 从 Secret 读取环境变量
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: db-password
        # 挂载 ConfigMap 为文件
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
      volumes:
      - name: config-volume
        configMap:
          name: app-config
