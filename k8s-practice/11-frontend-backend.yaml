# ============================================
# 实战案例：前后端分离应用
# 场景：前端调用后端 API
# ============================================

# 后端 API 服务
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
      - name: api
        image: hashicorp/http-echo:latest
        args:
          - "-text=Hello from Backend API"
          - "-listen=:8080"
        ports:
        - name: api-port
          containerPort: 8080
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"

---
# 后端 Service（ClusterIP，只在集群内访问）
apiVersion: v1
kind: Service
metadata:
  name: backend-api-service
  labels:
    app: backend
spec:
  type: ClusterIP  # 后端不需要外部访问
  selector:
    app: backend
  ports:
  - name: api
    protocol: TCP
    port: 8080
    targetPort: api-port

# 前端 Web 服务
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
        ports:
        - name: web-port
          containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        env:
        - name: BACKEND_URL
          value: "http://backend-api-service:8080"  # 前端通过 Service 名称访问后端

---
# 前端 Service（NodePort，可以外部访问）
apiVersion: v1
kind: Service
metadata:
  name: frontend-web-service
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - name: web
    protocol: TCP
    port: 80
    targetPort: web-port
    nodePort: 30090

# ============================================
# 架构说明
# ============================================
#
# 用户浏览器
#     ↓
# NodePort (30090)
#     ↓
# frontend-web-service (ClusterIP)
#     ↓
# Frontend Pod (Nginx)
#     ↓
# backend-api-service (ClusterIP)
#     ↓
# Backend Pod (API)
#
# ============================================

# ============================================
# 部署和测试
# ============================================

# 1. 部署所有资源
# kubectl apply -f 11-frontend-backend.yaml

# 2. 查看所有资源
# kubectl get deployments
# kubectl get pods
# kubectl get svc

# 3. 查看后端 Endpoints
# kubectl get endpoints backend-api-service
# 应该看到 3 个后端 Pod 的 IP

# 4. 查看前端 Endpoints
# kubectl get endpoints frontend-web-service
# 应该看到 2 个前端 Pod 的 IP

# 5. 测试后端 API（集群内访问）
# kubectl run -it --rm test --image=busybox --restart=Never -- wget -O- http://backend-api-service:8080

# 6. 测试前端（外部访问）
# curl http://localhost:30090

# 7. 进入前端 Pod，测试调用后端
# kubectl exec -it $(kubectl get pod -l app=frontend -o jsonpath='{.items[0].metadata.name}') -- sh
# 在 Pod 内执行：
# curl http://backend-api-service:8080

# 8. 查看服务发现（DNS）
# kubectl run -it --rm debug --image=busybox --restart=Never -- nslookup backend-api-service

# 9. 扩容后端
# kubectl scale deployment backend-api --replicas=5
# kubectl get endpoints backend-api-service  # 会看到 5 个 IP

# 10. 清理
# kubectl delete -f 11-frontend-backend.yaml

# ============================================
# 关键概念
# ============================================

# 1. 服务发现
#    前端通过 Service 名称访问后端：http://backend-api-service:8080
#    Kubernetes DNS 会自动解析 Service 名称

# 2. 负载均衡
#    后端有 3 个 Pod，Service 自动负载均衡
#    前端的每次请求会分发到不同的后端 Pod

# 3. Service 类型选择
#    - 后端：ClusterIP（只需要集群内访问）
#    - 前端：NodePort（需要外部访问）

# 4. 标签选择器
#    Service 通过 selector 找到对应的 Pod
#    必须确保标签匹配
