# Namespace 示例
apiVersion: v1
kind: Namespace
metadata:
  name: development

---
apiVersion: v1
kind: Namespace
metadata:
  name: production

---
# ResourceQuota - 限制命名空间资源使用
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: development
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    pods: "50"

---
# LimitRange - 设置默认资源限制
apiVersion: v1
kind: LimitRange
metadata:
  name: dev-limit-range
  namespace: development
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
