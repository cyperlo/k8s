# 健康检查示例
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-probes
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: webapp
        image: nginx:1.21
        ports:
        - containerPort: 80
        
        # 存活探针 - 检查容器是否还在运行
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15  # 容器启动后等待 15 秒
          periodSeconds: 10         # 每 10 秒检查一次
          timeoutSeconds: 3         # 超时时间 3 秒
          failureThreshold: 3       # 失败 3 次后重启容器
        
        # 就绪探针 - 检查容器是否准备好接收流量
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          successThreshold: 1       # 成功 1 次即认为就绪
          failureThreshold: 3
        
        # 启动探针 - 检查容器是否已启动（适用于启动慢的应用）
        startupProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 5
          failureThreshold: 30      # 最多等待 150 秒（5*30）
        
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
