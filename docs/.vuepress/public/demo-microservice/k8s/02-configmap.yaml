# ConfigMap - 应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: demo-app
data:
  # MySQL 配置
  MYSQL_HOST: "mysql-service"
  MYSQL_DATABASE: "demo_db"
  MYSQL_USER: "demo_user"
  
  # Redis 配置
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  
  # 应用配置
  LOG_LEVEL: "INFO"
  APP_ENV: "production"
